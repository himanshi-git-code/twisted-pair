<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Twisted Thread</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
    body {background:#FAFAFA; color:#333;}
    header {background:#fff; padding:20px 50px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
    header h1 {color:#FF6B6B; font-size:32px; font-family:'Pacifico', cursive;}
    nav a {margin-left:25px; text-decoration:none; color:#333; font-weight:600;}
    nav a:hover {color:#FF6B6B;}

    .signup-container {
      width:380px; margin:60px auto; background:#fff;
      padding:35px; border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,0.1);
    }
    .signup-container h2 {text-align:center; margin-bottom:20px; color:#FF6B6B;}
    .signup-container input {
      width:100%; padding:12px; margin:8px 0;
      border:1px solid #ccc; border-radius:8px; font-size:15px;
    }
    .signup-container input:focus {outline:none; border-color:#FF6B6B; box-shadow:0 0 6px #ff9999;}
    .signup-container button {
      width:100%; padding:12px; background:#cc5200;
      color:white; border:none; border-radius:8px;
      font-weight:bold; cursor:pointer; font-size:16px; margin-top:10px;
    }
    .signup-container button:hover {background:#b34700;}
    .login-link {text-align:center; margin-top:15px; font-size:14px;}
    .login-link a {color:#cc5200; font-weight:600; text-decoration:none;}
    .login-link a:hover {text-decoration:underline;}
    #statusMsg {text-align:center; font-weight:600; margin-top:10px;}
    footer {background:#fff; text-align:center; padding:20px; margin-top:50px; box-shadow:0 -2px 8px rgba(0,0,0,0.05);}

    .dark-mode {background:#121212; color:#f2f2f2;}
    .dark-mode header {background:#2C2C2C;}
    .dark-mode footer {background:#1A1A1A; color:#FF6B6B;}
    .dark-mode .signup-container {background:#1A1A1A;}
    .dark-mode .signup-container input {background:#2C2C2C; color:#f2f2f2; border:1px solid #555;}
    .dark-btn {background:#ff6b6b; color:white; border:none; border-radius:6px; padding:6px 10px; font-size:16px; margin-left:15px; cursor:pointer;}
    .dark-mode .dark-btn {background:#333; color:#ffb6b6;}
  </style>
</head>
<body>

<header>
  <h1>Twisted Thread</h1>
  <nav>
    <button id="dark-toggle" class="dark-btn">🌙</button>
  </nav>
</header>

<div class="signup-container">
  <h2>Create Account</h2>
  <form id="signupForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <button type="submit">Sign Up</button>
    <p id="statusMsg"></p>
  </form>
  <div class="login-link">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</div>

<footer>© 2025 Twisted Thread | Handmade with ❤</footer>

<script src="theme.js"></script>
<script>
  const statusMsg = document.getElementById('statusMsg');

  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();

    if(!username || !email || !password || !confirmPassword) {
      statusMsg.style.color = "red";
      statusMsg.textContent = "❌ Please fill in all fields!";
      return;
    }

    if(password !== confirmPassword) {
      statusMsg.style.color = "red";
      statusMsg.textContent = "❌ Passwords do not match!";
      return;
    }

    if(password.length < 4) {
      statusMsg.style.color = "red";
      statusMsg.textContent = "❌ Password must be at least 4 characters!";
      return;
    }

    try {
      const res = await fetch('http://localhost:4000/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();

      if(data.success) {
        statusMsg.style.color = "green";
        statusMsg.textContent = "✅ Account created! Redirecting to login...";
        setTimeout(() => window.location.href = "login.html", 1500);
      } else {
        statusMsg.style.color = "red";
        statusMsg.textContent = `❌ ${data.message}`;
      }
    } catch(err) {
      statusMsg.style.color = "red";
      statusMsg.textContent = "❌ Backend connection failed!";
    }
  });
</script>

</body>
</html>
