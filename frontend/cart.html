<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart - Twisted Thread</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#FAFAFA; color:#333;}

.dark-mode {background:#121212; color:#f2f2f2;}
.dark-mode header {background:#2C2C2C;}
.dark-mode footer {background:#1A1A1A; color:#FF6B6B;}
.dark-mode nav a {color:#FFB6B6;}
.dark-mode nav a:hover {color:#FF6B6B;}
.dark-mode .cart-container {background:#1A1A1A;}
.dark-mode th {background:#FF6B6B; color:white;}
.dark-mode td {background:#2C2C2C; color:#f2f2f2; border:1px solid #555;}

header{background:#fff;padding:20px 50px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:sticky;top:0;z-index:1000;}
header h1{color:#FF6B6B;font-size:32px;font-family:'Pacifico', cursive;}
nav{display:flex;align-items:center;gap:4px;}
nav a{margin-left:20px;text-decoration:none;color:#333;font-weight:600;font-size:14px;transition:0.3s;}
nav a:hover{color:#FF6B6B;}

.dark-btn{background:none;color:#333;border:none;font-size:18px;margin-left:18px;cursor:pointer;transition:0.3s;display:flex;align-items:center;}
.dark-btn:hover{color:#FF6B6B;transform:scale(1.1);}
.dark-mode .dark-btn{color:#FFB6B6;}

.user-menu{position:relative;display:inline-flex;align-items:center;margin-left:20px;}
.user-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#333;padding:0;transition:0.3s;}
.user-btn:hover{color:#FF6B6B;}
.dark-mode .user-btn{color:#FFB6B6;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:#FF6B6B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.user-chevron{font-size:10px;color:#888;transition:transform 0.25s;}
.user-menu.open .user-chevron{transform:rotate(180deg);}

.dropdown{display:none;position:absolute;right:0;top:calc(100% + 12px);background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);min-width:180px;z-index:999;overflow:hidden;border:1px solid #f0e0e0;}
.dropdown.show{display:block;animation:fadeDown 0.2s ease;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.dropdown-header{padding:14px 16px 10px;border-bottom:1px solid #f5e8e8;}
.dropdown-header p{font-size:13px;font-weight:700;color:#333;margin:0 0 2px;}
.dropdown-header span{font-size:11px;color:#999;font-weight:400;}
.dropdown button{width:100%;padding:11px 16px;border:none;background:none;text-align:left;font-size:13px;font-weight:600;cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:9px;color:#555;}
.dropdown button:hover{background:#fff5f5;color:#e63946;}
.dark-mode .dropdown{background:#2b2b2b;border:1px solid #3a3a3a;}
.dark-mode .dropdown-header{border-bottom:1px solid #3a3a3a;}
.dark-mode .dropdown-header p{color:#f2f2f2;}
.dark-mode .dropdown button{color:#ccc;}
.dark-mode .dropdown button:hover{background:#333;color:#ff8e8e;}

.cart-container{width:90%;max-width:1100px;margin:40px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1);}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px;text-align:center;border-bottom:1px solid #eee;}
th{background:#FF6B6B;color:white;}
td img{width:80px;border-radius:8px;}
.total-row td{font-weight:bold;font-size:18px;}
.option-badge{display:inline-block;background:#fff0e6;color:#cc5200;border:1px solid #cc5200;border-radius:20px;padding:3px 10px;font-size:13px;font-weight:600;}
.delete-btn{background:#ff4d4d;color:white;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;}
.delete-btn:hover{background:#cc0000;}
.checkout-btn{display:block;margin:30px auto 0;padding:12px 25px;background:#cc5200;color:white;font-weight:600;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
.checkout-btn:hover{background:#b34700;}

/* QTY BUTTONS */
.qty-wrap{display:flex;align-items:center;justify-content:center;}
.qty-btn{width:34px;height:34px;border:2px solid #ddd;background:#fff;font-size:20px;font-weight:700;cursor:pointer;color:#333;transition:0.2s;line-height:1;}
.qty-btn:hover{background:#FF6B6B;color:#fff;border-color:#FF6B6B;}
.qty-btn.minus{border-radius:8px 0 0 8px;}
.qty-btn.plus{border-radius:0 8px 8px 0;}
.qty-val{min-width:40px;height:34px;border-top:2px solid #ddd;border-bottom:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;background:#fafafa;}
.dark-mode .qty-btn{background:#2C2C2C;color:#f2f2f2;border-color:#555;}
.dark-mode .qty-val{background:#1e1e1e;color:#f2f2f2;border-color:#555;}

/* STOCK MSG */
.stock-msg-box{
  display:none;
  align-items:center;
  gap:12px;
  background:#fff0f0;
  border:2px solid #ff4d4d;
  border-radius:10px;
  padding:12px 20px;
  font-size:14px;
  font-weight:600;
  color:#cc0000;
  box-shadow:0 4px 14px rgba(255,0,0,0.15);
  margin:6px auto;
  max-width:500px;
  animation: slideIn 0.3s ease;
}
.stock-msg-box.visible{ display:flex; }
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.stock-msg-close{
  margin-left:auto;
  background:#ff4d4d;
  color:white;
  border:none;
  border-radius:50%;
  width:24px;height:24px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  flex-shrink:0;
  line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.stock-msg-close:hover{background:#cc0000;}

footer{background:#fff;text-align:center;padding:20px;margin-top:50px;box-shadow:0 -2px 8px rgba(0,0,0,0.05);}
#statusMsg{text-align:center;font-weight:600;color:#cc5200;margin-top:8px;}
</style>
</head>
<body>

<header>
  <h1>Twisted Thread</h1>
  <nav>
    <a href="home.html">Home</a>
    <a href="cart.html" id="cart-link">Cart</a>
    <a href="wishlist.html" id="wishlist-count">Wishlist</a>
    <div class="user-menu" id="user-menu">
      <button class="user-btn" id="user-btn" aria-haspopup="true" aria-expanded="false">
        <div class="user-avatar" id="user-avatar">G</div>
        <span>Hi, </span><span id="nav-username">Guest</span>
        <span class="user-chevron">▾</span>
      </button>
      <div class="dropdown" id="dropdown-menu" role="menu">
        <div class="dropdown-header">
          <p id="dropdown-name">Guest</p>
          <span>My Account</span>
        </div>
        <button onclick="logout()" role="menuitem">Logout</button>
      </div>
    </div>
    <button id="dark-toggle" class="dark-btn">🌙</button>
  </nav>
</header>

<div class="cart-container">
  <a href="javascript:history.back()" style="display:inline-flex;align-items:center;text-decoration:none;margin:0 0 20px 0;">
    <div style="width:46px;height:46px;background:white;border:3px solid #cc5200;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;"
      onmouseover="this.style.background='#cc5200';this.querySelector('svg').setAttribute('stroke','white')"
      onmouseout="this.style.background='white';this.querySelector('svg').setAttribute('stroke','#cc5200')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#cc5200" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
    </div>
  </a>

  <table>
    <thead>
      <tr>
        <th>Action</th>
        <th>Product</th>
        <th>Name</th>
        <th>Option</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="cart-body"></tbody>
  </table>

  <button class="checkout-btn" id="checkout">Checkout</button>
  <p id="statusMsg"></p>
</div>

<footer>&copy; 2025 Twisted Thread | Handmade with ❤</footer>

<script>
let username = localStorage.getItem("username") || "guest";
let cart = [];

const storedName = localStorage.getItem("username") || "Guest";
document.getElementById("nav-username").textContent = storedName;
document.getElementById("dropdown-name").textContent = storedName;
document.getElementById("user-avatar").textContent = storedName.charAt(0).toUpperCase();

const userMenu = document.getElementById("user-menu");
const userBtn  = document.getElementById("user-btn");
const dropdown = document.getElementById("dropdown-menu");
userBtn.addEventListener("click", (e)=>{
  e.stopPropagation();
  const isOpen = dropdown.classList.toggle("show");
  userMenu.classList.toggle("open", isOpen);
  userBtn.setAttribute("aria-expanded", isOpen);
});
document.addEventListener("click", ()=>{
  dropdown.classList.remove("show");
  userMenu.classList.remove("open");
});
function logout(){ localStorage.removeItem("username"); window.location.href="login.html"; }

async function updateWishlistCount(){
  try{
    const res=await fetch(`http://localhost:4000/wishlist/${username}`);
    const data=await res.json();
    const el=document.getElementById("wishlist-count");
    if(el) el.textContent=`Wishlist (${(data.items||[]).length})`;
  }catch(e){}
}

async function fetchCart(){
  const [cartRes, prodRes] = await Promise.all([
    fetch(`http://localhost:4000/cart/${username}`),
    fetch("products.json")
  ]);
  const cartData = await cartRes.json();
  const products = await prodRes.json();
  cart = (cartData.items||[]).map(item=>{
    // Try to find product by checking if item name starts with product name
    const prod = products.find(p => item.name === p.name || item.name.startsWith(p.name + " - "));
    return {...item, image: prod ? prod.image : ""};
  });
}

function getOptionLabel(item){
  const knownNames = [
    "Stylish Crochet Shrug",
    "Stylish Crochet Tote Bag",
    "Warm Crochet Beanie Hats",
    "Cute Crochet Keychains",
    "Elegant Crochet Summer Dress",
    "Kindness Heart - Hand Crochet Brooch",
    "Crochet Flowers Bouquet"
  ];
  const match = knownNames.find(n => item.name.startsWith(n + " - "));
  if(match) return item.name.slice(match.length + 3); // remove "ProductName - "
  if(item.size && item.size !== "undefined") return item.size;
  return "-";
}
function getProductName(item){
  // Find the matching product name from known products
  const knownNames = [
    "Stylish Crochet Shrug",
    "Stylish Crochet Tote Bag",
    "Warm Crochet Beanie Hats",
    "Cute Crochet Keychains",
    "Elegant Crochet Summer Dress",
    "Kindness Heart - Hand Crochet Brooch",
    "Crochet Flowers Bouquet"
  ];
  const match = knownNames.find(n => item.name === n || item.name.startsWith(n + " - "));
  return match || item.name;
}

function renderCart(){
  const tbody = document.getElementById("cart-body");
  tbody.innerHTML = "";
  let grandTotal = 0;

  cart.forEach((item, i)=>{
    const rowTotal = item.price * item.quantity;
    grandTotal += rowTotal;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><button class="delete-btn">Delete</button></td>
      <td><img src="${item.image}"></td>
      <td>${getProductName(item)}</td>
      <td><span class="option-badge">${getOptionLabel(item)}</span></td>
      <td class="price">₹${item.price}</td>
      <td>
        <div class="qty-wrap">
          <button class="qty-btn minus">−</button>
          <span class="qty-val">${item.quantity}</span>
          <button class="qty-btn plus">+</button>
        </div>
      </td>
      <td class="row-total">₹${rowTotal}</td>
    `;

    // Stock message row
    const msgRow = document.createElement("tr");
    msgRow.innerHTML = `<td colspan="7" style="padding:0 12px 4px; border:none;">
      <div class="stock-msg-box" id="smb-${i}">
        <span>⚠️ Out of stock! Can't add more</span>
        <button class="stock-msg-close" onclick="document.getElementById('smb-${i}').classList.remove('visible')">✕</button>
      </div>
    </td>`;

    tbody.appendChild(tr);
    tbody.appendChild(msgRow);

    function showMsg(){ document.getElementById(`smb-${i}`).classList.add("visible"); }

    // DELETE
    tr.querySelector(".delete-btn").addEventListener("click", async ()=>{
      if(item.productId){
        await fetch(`http://localhost:4000/stock/update`,{
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({productId:item.productId, size:item.size, delta:+item.quantity})
        });
      }
      cart.splice(i,1);
      await updateCartBackend();
      renderCart();
    });

    // MINUS
    tr.querySelector(".qty-btn.minus").addEventListener("click", async ()=>{
      if(item.quantity<=1) return;
      item.quantity--;
      if(item.productId){
        await fetch(`http://localhost:4000/stock/update`,{
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({productId:item.productId, size:item.size, delta:+1})
        });
      }
      await updateCartBackend();
      renderCart();
    });

    // PLUS
    tr.querySelector(".qty-btn.plus").addEventListener("click", async ()=>{
      if(item.productId){
        try{
          const stockRes = await fetch(`http://localhost:4000/stock/${item.productId}/${item.size}`);
          const stockData = await stockRes.json();
          const available = stockData.stock || 0;
          if(available<=0){ showMsg(); return; }
          item.quantity++;
          await fetch(`http://localhost:4000/stock/update`,{
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({productId:item.productId, size:item.size, delta:-1})
          });
        }catch(err){ return; }
      } else { item.quantity++; }
      await updateCartBackend();
      renderCart();
    });
  });

  const totalRow = document.createElement("tr");
  totalRow.className = "total-row";
  totalRow.innerHTML = `<td colspan="6">Grand Total</td><td>₹${grandTotal}</td>`;
  tbody.appendChild(totalRow);

  updateCartCount();
}

async function updateCartBackend(){
  const grandTotal = cart.reduce((sum,item)=>sum+item.price*item.quantity,0);
  const cartToSave = cart.map(({image,...rest})=>({...rest, totalPrice:rest.price*rest.quantity}));
  await fetch(`http://localhost:4000/cart/${username}`,{
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({cart:cartToSave, grandTotal})
  });
}

async function updateCartCount(){
  try{
    const res=await fetch(`http://localhost:4000/cart/${username}`);
    const data=await res.json();
    const count=(data.items||[]).reduce((sum,i)=>sum+i.quantity,0);
    document.getElementById("cart-link").textContent=`Cart (${count})`;
  }catch(e){}
}

document.getElementById("checkout").addEventListener("click",()=>{
  if(cart.length===0){alert("Cart is empty!"); return;}
  window.location.href="checkout.html";
});

window.addEventListener("load", async ()=>{
  await fetchCart();
  renderCart();
  updateWishlistCount();
});
</script>
<script src="theme.js"></script>
</body>
</html>
